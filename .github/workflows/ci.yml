name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast-gate:
    name: Fast Gate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Verify lockfile is up-to-date
        run: uv lock --check

      - name: Install dependencies
        run: pip install -e ".[dev]" docutils

      - name: Lint (ruff)
        run: ruff check aksharamd/ tests/ benchmarks/

      - name: Type check (mypy)
        run: mypy aksharamd/ --ignore-missing-imports --no-error-summary

      - name: Security scan (bandit)
        run: bandit -r aksharamd/ benchmarks/ -ll -q

      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit

      - name: Run tests with coverage
        run: |
          pytest tests/ -q --tb=short \
            --cov=aksharamd \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=72

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  integration:
    name: Integration (Python 3.11)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: pip install -e ".[dev,ocr]" docutils

      - name: Run full test suite with OCR
        run: |
          pytest tests/ -q --tb=short \
            --cov=aksharamd \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=72

  windows-smoke:
    name: Windows Smoke (Python 3.11)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Smoke test - help
        run: aksharamd --help

      - name: Smoke test - CLI unit tests
        run: pytest tests/test_cli.py tests/test_security.py -q --tb=short
