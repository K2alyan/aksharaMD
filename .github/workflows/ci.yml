name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast-gate:
    name: Fast Gate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Verify lockfile is up-to-date
        run: uv lock --check

      - name: Install dependencies
        run: pip install -e ".[dev]" docutils

      - name: Lint (ruff)
        run: ruff check aksharamd/ tests/ benchmarks/

      - name: Type check (mypy)
        run: mypy aksharamd/ --ignore-missing-imports --no-error-summary

      - name: Security scan (bandit)
        run: bandit -r aksharamd/ benchmarks/ -ll -q

      - name: Dependency audit (pip-audit)
        run: |
          python -m pip install --upgrade pip "setuptools>=83.0.0"
          python -m pip install pip-audit
          python -m pip_audit

      - name: Run tests with coverage
        run: |
          pytest tests/ -q --tb=short \
            --cov=aksharamd \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=72

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  integration:
    name: Integration (Python 3.11)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: pip install -e ".[dev,ocr]" docutils

      - name: Run full test suite with OCR
        run: |
          pytest tests/ -q --tb=short \
            --cov=aksharamd \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=72

  # ── Installed-wheel smoke test ────────────────────────────────────────────────
  # Builds a real wheel and installs it without -e to catch packaging issues
  # (missing package_data, broken entry points, import-time side effects, etc.)
  wheel-smoke:
    name: Wheel Smoke (Ubuntu, Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Install wheel (no editable install)
        run: |
          WHEEL=$(ls dist/aksharamd-*.whl)
          pip install "${WHEEL}[dev]"

      - name: Verify entry points
        run: |
          aksharamd --help
          aksharamd-mcp --help

      - name: Smoke compile markdown
        run: |
          printf '# Hello\n\nThis is a smoke test for the installed wheel.\n' > /tmp/smoke.md
          aksharamd compile /tmp/smoke.md -o /tmp/smoke-out
          test -f /tmp/smoke-out/smoke/document.md

      - name: Run targeted tests against installed wheel
        run: pytest tests/test_cli.py tests/test_compiler.py tests/test_security.py -q --tb=short

  # ── macOS smoke test ─────────────────────────────────────────────────────────
  macos-smoke:
    name: macOS Smoke (Python 3.12)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Smoke test - help
        run: aksharamd --help

      - name: Smoke test - compile
        run: |
          printf '# Hello\n\nThis is a macOS smoke test.\n' > /tmp/smoke.md
          aksharamd compile /tmp/smoke.md -o /tmp/smoke-out
          test -f /tmp/smoke-out/smoke/document.md

      - name: Smoke test - targeted tests
        run: pytest tests/test_cli.py tests/test_compiler.py tests/test_security.py -q --tb=short

  # ── Extras dependency-resolution checks ──────────────────────────────────────
  # Verifies that optional extras install cleanly without breaking the base package.
  # Light extras (cloud, ocr, index) are fully installed and import-tested.
  # Heavy extras (audio, vision, math) are resolution-checked only (--dry-run)
  # to avoid downloading multi-GB PyTorch wheels on CI.
  extras-resolve:
    name: Extras (${{ matrix.extra }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra: ["cloud", "ocr", "index"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies (ocr only)
        if: matrix.extra == 'ocr'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y tesseract-ocr

      - name: Install extra
        run: pip install -e ".[${{ matrix.extra }}]"

      - name: Verify base import
        run: python -c "import aksharamd; print(aksharamd.__version__)"

  extras-resolve-heavy:
    name: Extras dry-run (${{ matrix.extra }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra: ["audio", "vision", "math"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Build wheel for resolution check
        run: |
          pip install build
          python -m build --wheel

      - name: Check dependency resolution (no download)
        run: |
          WHEEL=$(ls dist/aksharamd-*.whl)
          uv pip install --dry-run --system "${WHEEL}[${{ matrix.extra }}]"

  # ── Windows smoke test ────────────────────────────────────────────────────────
  windows-smoke:
    name: Windows Smoke (Python 3.11)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Smoke test - help
        run: aksharamd --help

      - name: Smoke test - CLI unit tests
        run: pytest tests/test_cli.py tests/test_security.py -q --tb=short
