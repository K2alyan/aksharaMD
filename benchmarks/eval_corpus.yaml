# AksharaMD vs MarkItDown — Multi-LLM QA Evaluation Corpus
#
# 100 documents across 12 formats, 8–9 per format spanning simple/structured/complex tiers.
# Q&A pairs are auto-generated at runtime — see instructions below.
#
# ── STEP 1: Generate Q&A pairs (needs ANTHROPIC_API_KEY) ─────────────────────
#
#   python -m benchmarks.llm_qa_eval --qa benchmarks/eval_corpus.yaml \
#       --no-llm --save-qa benchmarks/eval_corpus_qa.yaml
#
#   (This pre-compiles the Q&A file so the full eval runs faster.)
#
# ── STEP 2: Run the full evaluation (needs all 3 API keys) ───────────────────
#
#   set ANTHROPIC_API_KEY=sk-ant-...
#   set OPENAI_API_KEY=sk-...
#   set GEMINI_API_KEY=AI...
#
#   python -m benchmarks.llm_qa_eval --qa benchmarks/eval_corpus_qa.yaml
#
# ── OR: Run everything in one shot ───────────────────────────────────────────
#
#   python -m benchmarks.llm_qa_eval \
#       $(python -c "import yaml; docs=yaml.safe_load(open('benchmarks/eval_corpus.yaml'))['documents']; print(' '.join(d['path'] for d in docs))") \
#       --save-qa benchmarks/eval_corpus_qa.yaml
#
# Results are saved to: benchmark_results/llm_qa_results.json

